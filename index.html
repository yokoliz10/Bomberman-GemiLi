<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel - Project 1 - Bomberman Clone</title>
    <link rel="stylesheet" href="./Assets/web fonts/silkscreen_bold_macroman/stylesheet.css" type="text/css" charset="utf-8" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- 🛡️ GemiLi PWA 装甲 & 屏幕自适应 🛡️ -->
    <link rel="manifest" href="./manifest.json?v=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
    
    <style>
        /* 抹杀一切滚动条，打造纯黑沉浸视界 */
        body, html {
            background-color: #000000 !important;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none; /* 彻底禁用系统手势 */
        }
        
        /* 锁定画布，绝对不拉伸！ */
        canvas {
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: contain !important;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>

<body>
    <h1>Bomberman<br>Clone</h1>
    <div id="content">
        <div id="game-board">
            <canvas id="canvas" width="750" height="600"></canvas>
        </div>
        <footer>
            <h2>Instructions</h2>
            <div id="instructions">
                <div class="player">
                    <h2>Player 1</h2>
                    <p>Move: Arrow keys</p>
                    <p>Place Bomb: Spacebar</p>
                </div>
                <div class="player">
                    <h2>Player 2</h2>
                    <p>Move: W A S D</p>
                    <p>Place Bomb: Q</p>
                </div>
            </div>
        </footer>
    </div>
    <script src="./JS/audio.js"></script>
    <script src="./JS/map.js"></script>
    <script src="./JS/sprite.js"></script>
    <script src="./JS/script.js"></script>
</body>

</html>
