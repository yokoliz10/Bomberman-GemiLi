<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GemiLi Bomb</title>
    <link rel="apple-touch-icon" href="./icon.png?v=7">
    <link rel="manifest" href="./manifest.json?v=7">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => { for(let r of regs) r.unregister(); }); }</script>
    
    <style>
        h1, footer { display: none !important; }
        body, html {
            background-color: #000000 !important; display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden; touch-action: none; 
            -webkit-user-select: none; user-select: none; 
        }
        #content, #game-board {
            display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;
        }
        canvas { max-width: 100vw !important; max-height: 100vh !important; object-fit: contain !important; }
        
        /* 炸弹按钮（开局前变暗，开局后点亮） */
        #bomb-btn {
            position: fixed; right: 8%; bottom: 15%; width: 70px; height: 70px;
            background-color: rgba(255, 50, 50, 0.7); border: 3px solid rgba(255, 255, 255, 0.8); border-radius: 50%;
            color: white; font-size: 30px; display: flex; justify-content: center; align-items: center;
            z-index: 9999; box-shadow: 0 0 15px rgba(255,0,0,0.5); backdrop-filter: blur(4px);
            opacity: 0.2; transition: opacity 0.3s;
        }
        #bomb-btn:active { background-color: rgba(255, 0, 0, 0.9); transform: scale(0.9); }
    </style>

    <!-- 🚀 绝密魔法：夺舍引擎 (必须放在加载 JS 之前！) 🚀 -->
    <script>
        // 1. 劫持画笔：篡改画布上的文字！
        const originalFillText = CanvasRenderingContext2D.prototype.fillText;
        CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
            if (typeof text === 'string' && text.includes('Press enter')) {
                text = 'TAP SCREEN TO START'; // 强行换字
            }
            return originalFillText.call(this, text, x, y, maxWidth);
        };

        // 2. 偷窃监听器：强行劫持游戏底层的键盘接收器！
        let gameKeyDown = null; let gameKeyUp = null;
        const originalWinAdd = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
            if (type === 'keydown') gameKeyDown = listener;
            if (type === 'keyup') gameKeyUp = listener;
            return originalWinAdd.call(window, type, listener, options);
        };
        const originalDocAdd = document.addEventListener;
        document.addEventListener = function(type, listener, options) {
            if (type === 'keydown') gameKeyDown = listener;
            if (type === 'keyup') gameKeyUp = listener;
            return originalDocAdd.call(document, type, listener, options);
        };

        // 绕过所有安全限制，直接把指令塞进引擎脑子里！
        function forceKey(type, code) {
            const mockEvent = { keyCode: code, which: code, preventDefault: ()=>{} };
            if (type === 'down' && gameKeyDown) gameKeyDown(mockEvent);
            if (type === 'up' && gameKeyUp) gameKeyUp(mockEvent);
        }
    </script>
</head>

<body>
    <!-- 主公专属战歌 -->
    <audio id="war-bgm" src="./bgm.mp3?v=8" loop></audio>

    <div id="content">
        <div id="game-board"><canvas id="canvas" width="750" height="600"></canvas></div>
    </div>
    <div id="bomb-btn">💣</div>

    <!-- 敌军原始核心代码 -->
    <script src="./JS/audio.js"></script>
    <script src="./JS/map.js"></script>
    <script src="./JS/sprite.js"></script>
    <script src="./JS/script.js"></script>

    <!-- 🚀 触屏映射 🚀 -->
    <script>
        let startX = 0, startY = 0; let activeKey = null; let isStarted = false;
        const bgm = document.getElementById('war-bgm');
        const bombBtn = document.getElementById('bomb-btn');

        // 全局屏幕触控接管
        window.addEventListener('touchstart', (e) => {
            if (e.target.id === 'bomb-btn') return; 
            e.preventDefault();
            
            // 核心：点屏幕任意位置直接开局！
            if (!isStarted) {
                forceKey('down', 13); // 强塞 Enter
                setTimeout(() => forceKey('up', 13), 50);
                if(bgm) bgm.play().catch(()=>{});
                bombBtn.style.opacity = '1'; // 点亮炸弹按钮
                isStarted = true;
                return;
            }

            startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return;
            e.preventDefault();
            let dx = e.touches[0].clientX - startX; let dy = e.touches[0].clientY - startY;
            let threshold = 15; let newKey = null;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) newKey = 39; // 右
                else if (dx < -threshold) newKey = 37; // 左
            } else {
                if (dy > threshold) newKey = 40; // 下
                else if (dy < -threshold) newKey = 38; // 上
            }

            if (newKey && newKey !== activeKey) {
                if (activeKey) forceKey('up', activeKey); 
                forceKey('down', newKey); 
                activeKey = newKey;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return;
            e.preventDefault();
            if (activeKey) { forceKey('up', activeKey); activeKey = null; }
        }, { passive: false });

        // 炸弹按钮接管
        bombBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); forceKey('down', 32); // 强塞空格键
        });
        bombBtn.addEventListener('touchend', (e) => {
            e.preventDefault(); forceKey('up', 32);
        });
    </script>
</body>
</html>
