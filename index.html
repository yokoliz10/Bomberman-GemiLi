<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GemiLi Bomb</title>
    <link rel="apple-touch-icon" href="./icon.png?v=4">
    <link rel="manifest" href="./manifest.json?v=4">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => { for(let r of regs) r.unregister(); }); }</script>
    
    <style>
        /* 屏蔽原作者废话 */
        h1, footer { display: none !important; }

        body, html {
            background-color: #000000 !important;
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            overflow: hidden; touch-action: none; 
            -webkit-user-select: none; user-select: none; 
        }
        
        #content, #game-board {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }

        canvas {
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: contain !important;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 🧨 军师定制：高爆实体炸弹按钮 (初始隐藏) 🧨 */
        #bomb-btn {
            position: fixed;
            right: 8%; bottom: 15%;
            width: 70px; height: 70px;
            background-color: rgba(255, 50, 50, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            color: white; font-size: 30px;
            display: none; /* 开局不显示，直到点了 START */
            justify-content: center; align-items: center;
            z-index: 9999;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        #bomb-btn:active { background-color: rgba(255, 0, 0, 0.9); transform: scale(0.9); }

        /* 🚀 军师定制：开局一键启动屏 🚀 */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }
        #start-btn {
            padding: 20px 50px;
            background: #e74c3c;
            border: 4px solid #fff;
            border-radius: 15px;
            color: #fff; font-family: sans-serif; font-size: 28px; font-weight: bold; letter-spacing: 2px;
            box-shadow: 0 0 30px #e74c3c;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>
    <audio id="war-bgm" src="./bgm.mp3?v=4" loop></audio>

    <div id="content">
        <div id="game-board">
            <canvas id="canvas" width="750" height="600"></canvas>
        </div>
    </div>
    
    <div id="bomb-btn">💣</div>

    <!-- 霸气的启动拦截网 -->
    <div id="start-screen">
        <div id="start-btn">TAP TO START</div>
    </div>

    <script src="./JS/audio.js"></script>
    <script src="./JS/map.js"></script>
    <script src="./JS/sprite.js"></script>
    <script src="./JS/script.js"></script>

    <script>
        function triggerKey(type, keyCode) {
            let e = new KeyboardEvent(type, { bubbles: true, cancelable: true });
            Object.defineProperty(e, 'keyCode', {get: () => keyCode});
            window.dispatchEvent(e);
        }

        let startX = 0, startY = 0;
        let activeKey = null;
        let isStarted = false;
        
        const bgm = document.getElementById('war-bgm');
        const bombBtn = document.getElementById('bomb-btn');
        const startScreen = document.getElementById('start-screen');

        // 1. 【核心】拦截开局，一键启动！
        startScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            
            // 底层偷偷发送 Enter 键 (键码13) 绕过菜单
            triggerKey('keydown', 13);
            setTimeout(() => triggerKey('keyup', 13), 100);

            // 战歌起
            if(bgm) bgm.play().catch(()=>{});

            // 销毁启动掩护，显示炸弹按钮，放行玩家
            startScreen.style.display = 'none';
            bombBtn.style.display = 'flex';
            isStarted = true;
        }, { passive: false });

        // 2. 划屏走位引擎
        window.addEventListener('touchstart', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return; 
            e.preventDefault();
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return;
            e.preventDefault();
            let dx = e.touches[0].clientX - startX;
            let dy = e.touches[0].clientY - startY;
            let threshold = 15; // 滑动触发阈值
            let newKey = null;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) newKey = 39; // 右
                else if (dx < -threshold) newKey = 37; // 左
            } else {
                if (dy > threshold) newKey = 40; // 下
                else if (dy < -threshold) newKey = 38; // 上
            }

            if (newKey && newKey !== activeKey) {
                if (activeKey) triggerKey('keyup', activeKey); 
                triggerKey('keydown', newKey); 
                activeKey = newKey;
                startX = e.touches[0].clientX; 
                startY = e.touches[0].clientY;
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return;
            e.preventDefault();
            if (activeKey) {
                triggerKey('keyup', activeKey); 
                activeKey = null;
            }
        }, { passive: false });

        // 3. 炸弹按钮
        bombBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerKey('keydown', 32);
        });
        bombBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            triggerKey('keyup', 32);
        });
    </script>
</body>
</html>
