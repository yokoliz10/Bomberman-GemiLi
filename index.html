<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>GemiLi Bomb</title>
    <!-- 挂载主公的专属图标 -->
    <link rel="apple-touch-icon" href="./icon.png?v=2">
    <link rel="manifest" href="./manifest.json?v=2">
    
    <!-- ⚠️ 清理了原版重复的 viewport，使用这套最强护甲 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => { for(let r of regs) r.unregister(); }); }</script>
    
    <style>
        /* 1. 物理超度原作者的废话文字！ */
        h1, footer { display: none !important; }

        /* 2. 打造纯黑沉浸视界 */
        body, html {
            background-color: #000000 !important;
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            overflow: hidden; touch-action: none; 
            -webkit-user-select: none; user-select: none; /* 防止长按选中文本 */
        }
        
        #content, #game-board {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }

        /* 3. 锁定画布，绝对完美等比缩放！ */
        canvas {
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: contain !important;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 4. 🧨 军师为您定制的高级感炸弹按钮 🧨 */
        #bomb-btn {
            position: fixed;
            right: 8%; /* 靠右，符合右手大拇指习惯 */
            bottom: 15%; /* 避开底部小黑条 */
            width: 70px;
            height: 70px;
            background-color: rgba(255, 50, 50, 0.7); /* 半透明战术红 */
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
            backdrop-filter: blur(4px); /* 毛玻璃高级质感 */
        }
        #bomb-btn:active { background-color: rgba(255, 0, 0, 0.9); transform: scale(0.9); } /* 按下时的动效反馈 */
    </style>
</head>

<body>
    <!-- 🎶 挂载主公的专属战歌 🎶 -->
    <audio id="war-bgm" src="./bgm.mp3?v=2" loop></audio>

    <div id="content">
        <div id="game-board">
            <canvas id="canvas" width="750" height="600"></canvas>
        </div>
    </div>
    
    <!-- 专属炸弹按钮 -->
    <div id="bomb-btn">💣</div>

    <script src="./JS/audio.js"></script>
    <script src="./JS/map.js"></script>
    <script src="./JS/sprite.js"></script>
    <script src="./JS/script.js"></script>

    <!-- 🚀 GemiLi 触屏夺权外挂引擎 🚀 -->
    <script>
        // 绝密魔法：将触摸信号伪装成电脑键盘信号
        function triggerKey(type, keyCode) {
            let e = new KeyboardEvent(type, { bubbles: true, cancelable: true });
            Object.defineProperty(e, 'keyCode', {get: () => keyCode});
            window.dispatchEvent(e);
        }

        let startX = 0, startY = 0;
        let activeKey = null;
        let isStarted = false;
        const bgm = document.getElementById('war-bgm');

        // 1. 划屏走位引擎
        window.addEventListener('touchstart', (e) => {
            if (e.target.id === 'bomb-btn') return; // 如果摸到的是炸弹按钮，不要触发划屏
            e.preventDefault();
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;

            // 第一下摸屏幕，战歌起！
            if (!isStarted) {
                if(bgm) bgm.play().catch(()=>{});
                isStarted = true;
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (e.target.id === 'bomb-btn') return;
            e.preventDefault();
            let dx = e.touches[0].clientX - startX;
            let dy = e.touches[0].clientY - startY;
            
            let threshold = 10; // 灵敏度
            let newKey = null;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) newKey = 39; // 右
                else if (dx < -threshold) newKey = 37; // 左
            } else {
                if (dy > threshold) newKey = 40; // 下
                else if (dy < -threshold) newKey = 38; // 上
            }

            if (newKey && newKey !== activeKey) {
                if (activeKey) triggerKey('keyup', activeKey); // 松开旧方向
                triggerKey('keydown', newKey); // 按下新方向
                activeKey = newKey;
                startX = e.touches[0].clientX; // 刷新原点，实现丝滑连续转弯
                startY = e.touches[0].clientY;
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (e.target.id === 'bomb-btn') return;
            e.preventDefault();
            if (activeKey) {
                triggerKey('keyup', activeKey); // 抬手即停
                activeKey = null;
            }
        }, { passive: false });

        // 2. 独立高爆按钮逻辑 (对应电脑的空格键，键码32)
        const bombBtn = document.getElementById('bomb-btn');
        bombBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerKey('keydown', 32);
            // 主动触发背景音乐（防止用户开局没划屏直接按炸弹）
            if (!isStarted && bgm) { bgm.play().catch(()=>{}); isStarted = true; }
        });
        bombBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            triggerKey('keyup', 32);
        });
    </script>
</body>

</html>
