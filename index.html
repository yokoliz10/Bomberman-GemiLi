<!-- 🚀 GemiLi 终极触屏夺权外挂引擎 (核弹防御版) 🚀 -->
    <script>
        // 终极伪装术：覆盖所有老旧/现代引擎的检测逻辑
        function triggerKey(type, keyCode, keyStr) {
            let e = new KeyboardEvent(type, { 
                bubbles: true, 
                cancelable: true,
                key: keyStr,
                code: keyStr
            });
            // 强行注入旧版属性
            Object.defineProperty(e, 'keyCode', {get: () => keyCode});
            Object.defineProperty(e, 'which', {get: () => keyCode});
            // 双管齐下，轰炸所有可能的监听层！
            document.dispatchEvent(e);
            window.dispatchEvent(e);
        }

        let startX = 0, startY = 0;
        let activeKey = null;
        let isStarted = false;
        
        const bgm = document.getElementById('war-bgm');
        const bombBtn = document.getElementById('bomb-btn');
        const startScreen = document.getElementById('start-screen');

        // 1. 强力破门逻辑：一键摧毁开始菜单
        startScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            
            // 军师绝命毒师计：连发三次 Enter 信号，绝对击穿它的防火墙！
            triggerKey('keydown', 13, 'Enter');
            setTimeout(() => triggerKey('keyup', 13, 'Enter'), 50);
            
            setTimeout(() => triggerKey('keydown', 13, 'Enter'), 100);
            setTimeout(() => triggerKey('keyup', 13, 'Enter'), 150);

            setTimeout(() => triggerKey('keydown', 13, 'Enter'), 200);
            setTimeout(() => triggerKey('keyup', 13, 'Enter'), 250);

            // 战歌起
            if(bgm) bgm.play().catch(()=>{});

            // 撤掉掩护，放出炸弹按钮
            startScreen.style.display = 'none';
            bombBtn.style.display = 'flex';
            isStarted = true;
        }, { passive: false });

        // 2. 划屏走位引擎 (补全了 keyStr)
        window.addEventListener('touchstart', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return; 
            e.preventDefault();
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return;
            e.preventDefault();
            let dx = e.touches[0].clientX - startX;
            let dy = e.touches[0].clientY - startY;
            let threshold = 15; 
            let newKey = null;
            let newKeyStr = '';

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) { newKey = 39; newKeyStr = 'ArrowRight'; }
                else if (dx < -threshold) { newKey = 37; newKeyStr = 'ArrowLeft'; }
            } else {
                if (dy > threshold) { newKey = 40; newKeyStr = 'ArrowDown'; }
                else if (dy < -threshold) { newKey = 38; newKeyStr = 'ArrowUp'; }
            }

            if (newKey && newKey !== activeKey) {
                if (activeKey) triggerKey('keyup', activeKey, ''); 
                triggerKey('keydown', newKey, newKeyStr); 
                activeKey = newKey;
                startX = e.touches[0].clientX; 
                startY = e.touches[0].clientY;
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (!isStarted || e.target.id === 'bomb-btn') return;
            e.preventDefault();
            if (activeKey) {
                triggerKey('keyup', activeKey, ''); 
                activeKey = null;
            }
        }, { passive: false });

        // 3. 定制实体炸弹按钮
        bombBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerKey('keydown', 32, ' ');
        });
        bombBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            triggerKey('keyup', 32, ' ');
        });
    </script>
